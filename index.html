*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;overscroll-behavior-y:none;background:radial-gradient(circle at 10% 0%,rgba(121,169,255,.13),transparent 27rem),radial-gradient(circle at 100% 10%,rgba(88,215,163,.10),transparent 30rem),var(--bg);color:var(--text);font-family:Inter,"PingFang SC","Microsoft YaHei",system-ui,-apple-system,sans-serif;line-height:1.55}button,input,select,textarea{font:inherit}button{cursor:pointer}a{color:#9fc1ff}.app{max-width:1500px;margin:auto;min-height:100vh}.topbar{position:sticky;top:0;z-index:30;background:rgba(7,16,29,.88);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.07)}.topbar-inner{max-width:1500px;margin:auto;padding:13px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{display:flex;align-items:center;gap:12px}.logo{width:44px;height:44px;border-radius:14px;background:#080c12;display:grid;place-items:center;overflow:hidden;border:1px solid rgba(255,255,255,.12);box-shadow:0 8px 24px rgba(0,0,0,.35)}.logo img{width:100%;height:100%;object-fit:cover;display:block}.brand h1{font-size:17px;margin:0}.brand small{display:block;color:var(--muted);font-size:12px}.top-actions{display:flex;gap:8px}.btn{border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:12px;padding:9px 13px;transition:.18s}.btn:hover{transform:translateY(-1px);border-color:#41618f}.btn.primary{background:linear-gradient(135deg,var(--accent),#45b991);border:0;color:#06120d;font-weight:800}.btn.secondary{background:linear-gradient(135deg,var(--accent2),#5d82d9);border:0;color:#08101e;font-weight:800}.btn.ghost{background:transparent}.btn.danger{border-color:#6a3340;color:#ffadb7}.layout{display:grid;grid-template-columns:245px minmax(0,1fr);gap:22px;padding:22px}.sidebar{position:sticky;top:88px;height:calc(100vh - 110px);padding:14px;background:rgba(14,26,43,.74);border:1px solid rgba(255,255,255,.08);border-radius:var(--r);box-shadow:var(--shadow);overflow:auto}.nav-btn{width:100%;display:flex;align-items:center;gap:11px;border:0;background:transparent;color:var(--muted);padding:11px 12px;border-radius:12px;text-align:left;margin:2px 0;font-weight:700}.nav-btn:hover{background:rgba(255,255,255,.05);color:var(--text)}.nav-btn.active{background:linear-gradient(90deg,rgba(88,215,163,.18),rgba(121,169,255,.10));color:#fff;border:1px solid rgba(88,215,163,.25)}.nav-icon{width:24px;text-align:center}.sidebar-footer{margin-top:16px;border-top:1px solid var(--line);padding-top:14px;color:var(--muted);font-size:12px}.main{min-width:0}.view{display:none}.view.active{display:block}.hero{display:grid;grid-template-columns:1.5fr .8fr;gap:18px;margin-bottom:18px}.card{background:linear-gradient(180deg,rgba(19,34,56,.96),rgba(13,25,42,.96));border:1px solid rgba(255,255,255,.08);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}.hero-main{padding:24px;background:linear-gradient(120deg,rgba(88,215,163,.14),transparent 48%),linear-gradient(330deg,rgba(121,169,255,.16),transparent 50%),var(--panel)}.eyebrow{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);font-weight:800}.hero h2{font-size:clamp(25px,4vw,42px);line-height:1.15;margin:8px 0 10px}.hero p,.subtle{color:var(--muted)}.hero p{max-width:850px;margin:0}.pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}.pill,.tag{display:inline-flex;align-items:center;border:1px solid rgba(255,255,255,.11);padding:5px 9px;border-radius:999px;color:#dce8f8;background:rgba(255,255,255,.04);font-size:11px;font-weight:750}.tag.green{background:rgba(88,215,163,.12);color:#a8f0d2;border-color:rgba(88,215,163,.2)}.tag.orange{background:rgba(255,199,107,.12);color:#ffda99;border-color:rgba(255,199,107,.2)}.metric-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.metric{padding:14px;border-radius:15px;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.07)}.metric .label{color:var(--muted);font-size:12px}.metric .v .cloud-status{display:flex;align-items:center;gap:9px;flex-wrap:wrap;padding:12px 14px;border:1px solid var(--line);border-radius:13px;background:rgba(255,255,255,.025)}
.status-dot{width:10px;height:10px;border-radius:50%;background:var(--warn);box-shadow:0 0 0 4px rgba(255,199,107,.08)}
.status-dot.online{background:var(--ok);box-shadow:0 0 0 4px rgba(88,215,163,.10)}
.status-dot.error{background:var(--danger);box-shadow:0 0 0 4px rgba(255,123,139,.10)}
.photo-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.photo-card{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#081321}
.photo-card img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;background:#07101d}
.photo-meta{padding:10px;font-size:12px;color:var(--muted)}
.compare-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}

.compare-frame img{width:100%;height:100%;max-height:620px;object-fit:contain}
.compare-label{position:absolute;left:10px;top:10px;padding:5px 9px;border-radius:999px;background:rgba(7,16,29,.82);font-size:11px}
.food-list{display:grid;gap:9px}
.food-row{display:grid;grid-template-columns:1.4fr repeat(5,.65fr) auto;gap:8px;align-items:center;padding:10px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.02)}
.test-pass{color:var(--ok)}.test-fail{color:var(--danger)}
.test-row{display:grid;grid-template-columns:28px 1fr auto;gap:9px;padding:9px 0;border-bottom:1px solid var(--line)}
.sync-log{max-height:210px;overflow:auto;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;background:#07111f;border:1px solid var(--line);padding:10px;border-radius:12px;white-space:pre-wrap}

  else{title='恢复与评估';summary='轻量全幅度卧推 3×6';sets=Array.from({length:3},(_,i)=>({label:`轻量${i+1}`,targetReps:'6',targetRir:'4',suggestedWeight:vb}));}
 }

function getStats(){
 const last7=recentDates(7),prev7=recentDates(7,recentDates(14)[6]);
 const values=(ds,key)=>ds.map(date=>n(state.daily[date]?.[key])).filter(v=>v>0),mealDays=last7.filter(date=>(state.daily[date]?.meals||[]).length>0),prevMealDays=prev7.filter(date=>(state.daily[date]?.meals||[]).length>0);
 const mealVals=(ds,key)=>ds.filter(date=>(state.daily[date]?.meals||[]).length>0).map(date=>dailyTotals(date)[key]);
 const weightDays=values(last7,'weight'),prevWeightDays=values(prev7,'weight'),stepsDays=values(last7,'steps'),sleepDays=values(last7,'sleep');
 const waistNow=latestValue(last7,'waist'),waistPrev=latestValue(prev7,'waist');
 const workouts7=Object.entries(state.workouts).filter(([date,w])=>last7.includes(date)&&w.completed&&isStrength(w.type)).length;
 const proteinMet=mealDays.filter(date=>dailyTotals(date).p>=targetForDate(date).protein).length;
 const caloriesMet=mealDays.filter(date=>Math.abs(dailyTotals(date).cal-targetForDate(date).calories)<=150).length;
 return{weight7:avg(weightDays),weightPrev:avg(prevWeightDays),weightDays:weightDays.length,prevWeightDays:prevWeightDays.length,waistNow,waistPrev,mealDays:mealDays.length,prevMealDays:prevMealDays.length,protein7:avg(mealVals(last7,'p')),cal7:avg(mealVals(last7,'cal')),proteinMet,caloriesMet,steps7:avg(stepsDays),stepsDays:stepsDays.length,sleep7:avg(sleepDays),sleepDays:sleepDays.length,workouts7};
}
function benchCategory(exr){const k=exr.key||inferExerciseKey(exr.name);return k==='bench_pause'?'pause':k==='bench_touch'?'touch':null}
function benchSessions(category){
 const rows=[];Object.entries(state.workouts).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([date,w])=>(w.exercises||[]).forEach(exr=>{if(benchCategory(exr)!==category)return;let best=null;(exr.sets||[]).forEach(s=>{const wt=n(s.weight),reps=n(s.reps);if(wt>0&&reps>0&&reps<=12){const e=wt*(1+reps/30);if(!best||e>best.e)best={e,wt,reps}}});if(best)rows.push({...best,date})}));return rows;

function saveCustomExercise(){const name=document.getElementById('cxName').value.trim();if(!name)return alert('请输入动作名称');const id=state.ui.editExerciseId||`custom_${Date.now()}`,assign=[...document.querySelectorAll('.cxAssign:checked')].map(x=>x.value),obj={id,name,sets:n(document.getElementById('cxSets').value)||3,reps:document.getElementById('cxReps').value||'8–12',rir:document.getElementById('cxRir').value||'1–2',restSeconds:n(document.getElementById('cxRest').value)||90,rest:`${n(document.getElementById('cxRest').value)||90}秒`,category:document.getElementById('cxCategory').value,note:document.getElementById('cxNote').value,assign,updatedAt:Date.now()};const i=state.customExercises.findIndex(x=>x.id===id);if(i>=0)state.customExercises[i]=obj;else state.customExercises.push(obj);Object.keys(state.planCustom).forEach(k=>state.planCustom[k]=state.planCustom[k].filter(x=>x!==id));assign.forEach(k=>state.planCustom[k].push(id));state.ui.editExerciseId=null;saveState('动作库已更新');renderPlan()}

function renderNutrition(){const date=todayISO(),t=targetForDate(date),tot=dailyTotals(date),rec=nutritionRecommendation();document.getElementById('view-nutrition').innerHTML=`<div class="section-title"><div><h2>饮食方案</h2><p>${state.nutrition.mode==='auto'?'自动推荐会随7日体重、饮食记录和目标变化':'当前使用手动热量与宏量营养目标'}。</p></div><span class="tag green">${effectiveNutritionMode(date)==='training'?'训练日':'休息日'}</span></div><div class="dynamic-target"><div class="section-title"><div><h3>当前自动建议</h3><p>${rec.source} · 计算体重 ${fmt(rec.weight,2)}kg · 估算TDEE ${fmt(rec.tdee,0)} kcal</p></div><span class="tag ${rec.adaptive?'green':'orange'}">${rec.adaptive?'已启用自适应':'公式初始估算'}</span></div><div class="stat-strip"><div class="stat-chip"><span>基础代谢</span><strong>${fmt(rec.bmr,0)} kcal</strong></div><div class="stat-chip"><span>周均目标</span><strong>${rec.averageCalories} kcal</strong></div><div class="stat-chip"><span>目标速度</span><strong>${rec.rate>0?'+':''}${rec.rate} kg/周</strong></div><div class="stat-chip"><span>训练日</span><strong>${rec.targets.training.calories} kcal</strong></div><div class="stat-chip"><span>休息日</span><strong>${rec.targets.rest.calories} kcal</strong></div><div class="stat-chip"><span>蛋白质</span><strong>${rec.targets.training.protein} g</strong></div></div></div><div class="grid-2" style="margin-top:18px"><div class="card"><h3>训练日目标</h3>${macroTarget(targets.training)}</div><div class="card"><h3>休息/恢复日目标</h3>${macroTarget(targets.rest)}</div></div><div class="card" style="margin-top:18px"><div class="section-title"><div><h2>今日摄入</h2><p>${date} · 目标 ${t.calories} kcal</p></div><button class="btn primary" onclick="switchView('log')">记录饮食</button></div>${macroBars(tot,t)}</div><div class="card" style="margin-top:18px"><h2>训练日时间模板</h2><div class="table-wrap"><table><thead><tr><th>时间</th><th>餐次</th><th>建议</th><th>目的</th></tr></thead><tbody><tr><td>08:30</td><td>早餐</td><td>燕麦50g、奶粉25g、全蛋2个、乳清35g、水果150g</td><td>约50g蛋白</td></tr><tr><td>12:00–13:00</td><td>午餐</td><td>熟米饭250g、熟瘦肉150–180g、蔬菜250g；外食油10–15g估算</td><td>稳定能量</td></tr><tr><td>16:30–17:15</td><td>训练前</td><td>香蕉＋酸奶，或面包60g＋乳清20g</td><td>低脂碳水＋蛋白</td></tr><tr><td>19:30–20:30</td><td>训练后</td><td>熟米饭220–250g、熟瘦肉180g、蔬菜250g</td><td>恢复并补足全天</td></tr></tbody></table></div></div><div class="grid-2" style="margin-top:18px"><div class="card"><h3>14元外食策略</h3><ol><li>先选白切鸡、去皮鸡腿、鱼、瘦肉或牛肉。</li><li>再选青菜、菌菇、豆腐。</li><li>肉量不足时用乳清补，不用第二份高油主菜。</li><li>固定店铺与份量，用3周趋势校准估算误差。</li></ol></div><div class="card"><h3>甜品与咖啡</h3><ul><li>无糖美式可保留；晚间训练避免傍晚大剂量咖啡因。</li><li>小黄油冰美式按甜品饮料记录，无数据时预留200–300 kcal。</li><li>糖水无数据时按300–400 kcal记录；减少当日部分主食或油脂，不减蛋白质。</li></ul></div></div><div class="card" style="margin-top:18px"><h2>食物模板库</h2><div class="preset-grid">${mealPresets.map((m,i)=>presetCard(m,i,false)).join('')}</div></div>`}
let timerRemaining=0,timerInterval=null;
function timerText(){const m=Math.floor(timerRemaining/60),s=timerRemaining%60;return`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}
function updateTimer(){const el=document.getElementById('timerDisplay');if(el)el.textContent=timerText()}
function startTimer(sec){clearInterval(timerInterval);timerRemaining=Math.max(0,Math.round(sec));updateTimer();timerInterval=setInterval(()=>{timerRemaining--;updateTimer();if(timerRemaining<=0){clearInterval(timerInterval);timerInterval=null;if(navigator.vibrate)navigator.vibrate([150,80,150]);try{const ac=new(window.AudioContext||window.webkitAudioContext)(),o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.value=880;g.gain.value=.08;o.start();o.stop(ac.currentTime+.25)}catch(e){}toast('休息时间结束')}} ,1000)}
function stopTimer(){clearInterval(timerInterval);timerInterval=null;timerRemaining=0;updateTimer()}
function timerWidget(){return`<div class="timer-box"><div><div class="small-note">组间计时器</div><div class="timer-display" id="timerDisplay">${timerText()}</div></div><div class="timer-actions"><button class="mini-btn" onclick="startTimer(60)">60秒</button><button class="mini-btn" onclick="startTimer(90)">90秒</button><button class="mini-btn" onclick="startTimer(120)">2分</button><button class="mini-btn" onclick="startTimer(180)">3分</button><button class="mini-btn" onclick="startTimer(240)">4分</button><button class="mini-btn" onclick="stopTimer()">停止</button></div></div>`}
function renderLog(){
 const date=state.ui.logDate||todayISO();state.ui.logDate=date;let type=state.workouts[date]?.type||state.ui.logType||recommendedPlan(date);state.ui.logType=type;ensureWorkout(date,type);const d=getDaily(date),w=state.workouts[date],t=targetForDate(date),tot=dailyTotals(date),bp=benchPrescription(type,date);
 document.getElementById('view-log').innerHTML=`<div class="section-title"><div><h2>每日记录</h2><p>V${APP_VERSION}支持快速记录、周期处方、周复盘、自适应营养、体型照片、云端同步与开发档案。</p></div><span class="tag green">本地自动保存</span></div><div class="card"><div class="form-grid"><div class="field"><label>日期</label><input type="date" value="${date}" onchange="changeLogDate(this.value)"></div><div class="field"><label>训练类型</label><select onchange="changeLogType(this.value)">${Object.keys(plans).map(k=>`<option value="${k}" ${type===k?'selected':''}>${plans[k].short}</option>`).join('')}</select></div><div class="field"><label>饮食目标模式</label><select onchange="setNutritionMode('${date}',this.value)"><option value="auto" ${d.nutritionMode==='auto'?'selected':''}>自动（按实际训练）</option><option value="training" ${d.nutritionMode==='training'?'selected':''}>训练日 ${targets.training.calories} kcal</option><option value="rest" ${d.nutritionMode==='rest'?'selected':''}>休息日 ${targets.rest.calories} kcal</option></select></div><div class="field"><label>当前自动周数</label><input value="第 ${currentWeek(date)} 周 / 卧推第 ${benchWeek(date)} 周" disabled></div>${quickField(date,'weight','晨重 kg',d.weight,'0.01')}${quickField(date,'waist','腰围 cm',d.waist,'0.1')}${quickField(date,'sleep','睡眠 h',d.sleep,'0.1')}${quickField(date,'steps','步数',d.steps,'1')}${quickField(date,'water','饮水 L',d.water,'0.1')}${quickField(date,'cardio','有氧分钟',d.cardio,'1')}${quickField(date,'hunger','饥饿 0–10',d.hunger,'1')}${quickField(date,'fatigue','疲劳 0–10',d.fatigue,'1')}${quickField(date,'wristPain','手腕痛 0–10',d.wristPain,'1')}${quickField(date,'shoulderPain','肩部痛 0–10',d.shoulderPain,'1')}</div></div><div class="grid-2" style="margin-top:18px;align-items:start"><div class="card"><div class="section-title"><div><h2>训练记录</h2><p>${plans[type].title}</p></div><span class="tag">${w.completed?'已完成':'进行中'}</span></div>${bp?prescriptionCard(bp,type):''}${timerWidget()}<div class="inline-actions"><button class="btn" onclick="copyPreviousWorkout('${date}')">复制上次同类训练</button><button class="btn" onclick="fillAllSuggestions('${date}')">填入全部参考重量</button></div>${workoutEditor(date,w)}<div class="field" style="margin-top:12px"><label>训练备注</label><textarea onchange="setWorkoutNote('${date}',this.value)" placeholder="动作感受、疼痛、视频问题、器械差异">${esc(w.notes||'')}</textarea></div><div class="inline-actions"><button class="btn primary" onclick="finishWorkout('${date}')">${w.completed?'取消完成':'标记训练完成'}</button><button class="btn ghost" onclick="resetWorkout('${date}')">重置当日训练</button></div></div><div><div class="card"><div class="section-title"><div><h2>饮食记录</h2><p>${effectiveNutritionMode(date)==='training'?'训练日目标':'休息日目标'} · 实时计算</p></div><span class="tag" id="logCalTag">${fmt(tot.cal,0)} kcal</span></div><div id="logMacroSummary">${macroBars(tot,t)}</div><div id="mealRows">${mealRows(date,d.meals)}</div><div class="inline-actions"><button class="btn" onclick="addMealRow('${date}')">＋ 自定义食物</button><button class="btn secondary" onclick="document.getElementById('quickPresets').scrollIntoView({behavior:'smooth'})">使用模板</button></div></div><div class="card" id="quickPresets" style="margin-top:18px"><h3>快速模板</h3><div class="preset-grid" style="grid-template-columns:1fr">${mealPresets.slice(0,6).map((m,i)=>presetCard(m,i,true)).join('')}</div></div></div></div><div class="card" style="margin-top:18px"><h3>每日主观记录</h3><textarea onchange="setDaily('${date}','notes',this.value)" placeholder="饥饿、精神、压力、消化、外食、身体状态">${esc(d.notes||'')}</textarea></div>`;updateTimer();
}
function workoutEditor(date,w){if(!w.exercises?.length)return'<div class="empty">该日没有力量训练动作。</div>';return w.exercises.map((er,ei)=>`<div class="exercise-card"><div class="exercise-head"><div><h4>${er.name}</h4><div class="exercise-meta">${er.targetSets}组 · ${er.targetReps} · 目标RIR ${er.targetRir} · 休息${er.rest||''}</div><div class="small-note">${esc(er.note||'')}</div></div><div class="exercise-tools">${lastExerciseHint(er.key,er.name,date)}<button class="mini-btn" onclick="copyPreviousExercise('${date}',${ei})">复制上次</button><button class="mini-btn" onclick="cascadeExerciseDown('${date}',${ei})">首组下移</button>${er.sets.some(s=>s.suggestedWeight)?`<button class="mini-btn" onclick="fillSuggestions('${date}',${ei})">填参考重量</button>`:''}</div></div>${er.sets.map((s,si)=>`<div class="set-row"><span class="set-num"><strong>${si+1}</strong><span class="set-label" title="${esc(s.label)}">${esc(s.label)}</span><button class="mini-btn set-shift" title="把本组重量、次数、RIR填到后续组" onclick="cascadeSetDown('${date}',${ei},${si})">↓</button></span><input type="number" step="0.5" placeholder="${s.suggestedWeight?s.suggestedWeight+'kg':'kg'}" value="${esc(s.weight)}" onchange="setWorkoutSet('${date}',${ei},${si},'weight',this.value)"><input type="number" step="1" placeholder="${esc(s.targetReps||'次数')}" value="${esc(s.reps)}" onchange="setWorkoutSet('${date}',${ei},${si},'reps',this.value)"><input type="number" step="1" min="0" max="6" placeholder="RIR ${esc(s.targetRir||'')}" value="${esc(s.rir)}" onchange="setWorkoutSet('${date}',${ei},${si},'rir',this.value)"><input class="set-done" type="checkbox" ${s.done?'checked':''} onchange="setWorkoutSet('${date}',${ei},${si},'done',this.checked)"></div>`).join('')}</div>`).join('')}
function previousWorkout(date,type){return Object.entries(state.workouts).filter(([dt,w])=>dt<date&&w.type===type&&hasWorkoutData(w)).sort((a,b)=>b[0].localeCompare(a[0]))[0]||null}
function previousExercise(date,key,name){const rows=Object.entries(state.workouts).filter(([dt])=>dt<date).sort((a,b)=>b[0].localeCompare(a[0]));for(const [dt,w] of rows){const er=(w.exercises||[]).find(x=>(x.key||inferExerciseKey(x.name))===key||x.name===name);if(er&&er.sets?.some(s=>n(s.weight)>0||n(s.reps)>0))return{date:dt,exercise:er}}return null}
function lastExerciseHint(key,name,date){const prev=previousExercise(date,key,name);if(!prev)return'<span class="tag">首次记录</span>';const valid=prev.exercise.sets.filter(s=>n(s.weight)>0&&n(s.reps)>0);if(!valid.length)return`<span class="tag">上次 ${prev.date}</span>`;const best=valid.reduce((a,b)=>n(a.weight)*n(a.reps)>=n(b.weight)*n(b.reps)?a:b);return`<span class="tag">上次 ${best.weight}kg×${best.reps}</span>`}
function copyPreviousWorkout(date){const w=state.workouts[date],prev=previousWorkout(date,w.type);if(!prev){toast('没有找到上次同类训练');return}w.exercises.forEach(er=>{const pe=prev[1].exercises.find(x=>(x.key||inferExerciseKey(x.name))===(er.key||inferExerciseKey(er.name)));if(pe)er.sets.forEach((s,i)=>{const ps=pe.sets[Math.min(i,pe.sets.length-1)];if(ps){s.weight=ps.weight;s.reps=ps.reps;s.rir=ps.rir}})});saveState('已复制上次同类训练');renderLog()}
function copyPreviousExercise(date,ei){const er=state.workouts[date].exercises[ei],prev=previousExercise(date,er.key,er.name);if(!prev){toast('没有找到该动作的历史记录');return}er.sets.forEach((s,i)=>{const ps=prev.exercise.sets[Math.min(i,prev.exercise.sets.length-1)];if(ps){s.weight=ps.weight;s.reps=ps.reps;s.rir=ps.rir}});saveState('已复制上次动作');renderLog()}
function fillSuggestions(date,ei){const er=state.workouts[date].exercises[ei];er.sets.forEach(s=>{if(s.suggestedWeight!==''&&s.suggestedWeight!==undefined)s.weight=s.suggestedWeight});saveState('已填入参考重量');renderLog()}
function fillAllSuggestions(date){state.workouts[date].exercises.forEach(er=>er.sets.forEach(s=>{if(s.suggestedWeight!==''&&s.suggestedWeight!==undefined)s.weight=s.suggestedWeight}));saveState('已填入全部参考重量');renderLog()}

function mealRows(date,meals){if(!meals.length)return'<div class="empty" style="margin-top:14px">尚未记录食物。可使用模板或添加自定义食物。</div>';return meals.map((m,i)=>`<div class="meal-row"><input class="meal-name" placeholder="食物/餐次" value="${esc(m.name)}" oninput="setMeal('${date}',${i},'name',this.value)"><input type="number" placeholder="kcal" value="${esc(m.cal)}" oninput="setMeal('${date}',${i},'cal',this.value)"><input type="number" step="0.1" placeholder="蛋白g" value="${esc(m.p)}" oninput="setMeal('${date}',${i},'p',this.value)"><input type="number" step="0.1" placeholder="碳水g" value="${esc(m.c)}" oninput="setMeal('${date}',${i},'c',this.value)"><input type="number" step="0.1" placeholder="脂肪g" value="${esc(m.f)}" oninput="setMeal('${date}',${i},'f',this.value)"><button class="remove-btn" onclick="removeMeal('${date}',${i})">×</button></div>`).join('')}

function completenessDots(on,total=7){return`<div class="complete-meter">${Array.from({length:total},(_,i)=>`<span class="complete-dot ${i<on?'on':''}"></span>`).join('')}<span class="small-note">${on}/${total}天</span></div>`}
function historyDates(){return[...new Set([...Object.keys(state.daily),...Object.keys(state.workouts)])].sort().reverse()}
function filteredHistoryDates(){let rows=historyDates(),range=state.ui.historyRange||'30',type=state.ui.historyType||'all';if(range!=='all'){const min=new Date();min.setDate(min.getDate()-n(range)+1);const m=todayISO(min);rows=rows.filter(d=>d>=m)}if(type==='workout')rows=rows.filter(d=>state.workouts[d]);if(type==='nutrition')rows=rows.filter(d=>(state.daily[d]?.meals||[]).length);if(type==='body')rows=rows.filter(d=>n(state.daily[d]?.weight)>0||n(state.daily[d]?.waist)>0);return rows}
function renderHistory(){const rows=filteredHistoryDates();if(!state.ui.historyDate||!rows.includes(state.ui.historyDate))state.ui.historyDate=rows[0]||null;const sel=state.ui.historyDate;document.getElementById('view-history').innerHTML=`<div class="section-title"><div><h2>历史记录中心</h2><p>集中查看每天的身体、饮食、训练和恢复数据；点击任意日期查看完整内容。</p></div><span class="tag green">${historyDates().length} 个记录日</span></div><div class="card"><div class="form-grid" style="grid-template-columns:repeat(2,minmax(0,220px))"><div class="field"><label>时间范围</label><select onchange="state.ui.historyRange=this.value;saveState();renderHistory()"><option value="14" ${state.ui.historyRange==='14'?'selected':''}>最近14天</option><option value="30" ${state.ui.historyRange==='30'?'selected':''}>最近30天</option><option value="90" ${state.ui.historyRange==='90'?'selected':''}>最近90天</option><option value="all" ${state.ui.historyRange==='all'?'selected':''}>全部</option></select></div><div class="field"><label>记录类型</label><select onchange="state.ui.historyType=this.value;saveState();renderHistory()"><option value="all" ${state.ui.historyType==='all'?'selected':''}>全部</option><option value="workout" ${state.ui.historyType==='workout'?'selected':''}>有训练</option><option value="nutrition" ${state.ui.historyType==='nutrition'?'selected':''}>有饮食</option><option value="body" ${state.ui.historyType==='body'?'selected':''}>体重/腰围</option></select></div></div><div class="table-wrap" style="margin-top:14px"><table><thead><tr><th>日期</th><th>训练</th><th>体重</th><th>腰围</th><th>热量/蛋白</th><th>步数/睡眠</th></tr></thead><tbody>${rows.length?rows.map(d=>historyRow(d,sel)).join(''):'<tr><td colspan="6" class="subtle">暂无符合条件的记录。</td></tr>'}</tbody></table></div></div>${sel?historyDetail(sel):''}`}
function historyRow(date,selected){const d=state.daily[date]||{},w=state.workouts[date],t=dailyTotals(date);return`<tr class="history-row ${date===selected?'selected':''}" onclick="selectHistoryDate('${date}')"><td><strong>${date}</strong></td><td>${w?`${plans[w.type]?.short||w.type} ${w.completed?'<span class="tag green">完成</span>':'<span class="tag orange">未完成</span>'}`:'—'}</td><td>${d.weight?d.weight+'kg':'—'}</td><td>${d.waist?d.waist+'cm':'—'}</td><td>${(d.meals||[]).length?`${fmt(t.cal,0)} kcal / P${fmt(t.p,0)}g`:'—'}</td><td>${d.steps||'—'} / ${d.sleep?d.sleep+'h':'—'}</td></tr>`}
function selectHistoryDate(date){state.ui.historyDate=date;saveState();renderHistory()}
function historyDetail(date){const d=state.daily[date]||{},w=state.workouts[date],t=dailyTotals(date);return`<div class="card history-detail"><div class="section-title"><div><h2>${date} 完整记录</h2><p>所有当天保存的内容。</p></div><div class="inline-actions"><button class="btn primary" onclick="openHistoryInLog('${date}')">打开编辑</button><button class="btn danger" onclick="deleteHistoryDate('${date}')">删除当天</button></div></div><div class="stat-strip"><div class="stat-chip"><span>体重</span><strong>${d.weight||'—'} kg</strong></div><div class="stat-chip"><span>腰围</span><strong>${d.waist||'—'} cm</strong></div><div class="stat-chip"><span>热量</span><strong>${fmt(t.cal,0)} kcal</strong></div><div class="stat-chip"><span>蛋白质</span><strong>${fmt(t.p,0)} g</strong></div><div class="stat-chip"><span>步数</span><strong>${d.steps||'—'}</strong></div><div class="stat-chip"><span>睡眠</span><strong>${d.sleep||'—'} h</strong></div></div><div class="grid-2" style="margin-top:16px"><div><h3>饮食</h3>${(d.meals||[]).length?`<div class="table-wrap"><table class="mini-table"><thead><tr><th>食物</th><th>kcal</th><th>P</th><th>C</th><th>F</th></tr></thead><tbody>${d.meals.map(m=>`<tr><td>${esc(m.name)}</td><td>${m.cal}</td><td>${m.p}</td><td>${m.c}</td><td>${m.f}</td></tr>`).join('')}</tbody></table></div>`:'<div class="empty-inline">无饮食记录</div>'}<h3>恢复与备注</h3><p class="subtle">饥饿 ${d.hunger||'—'}/10 · 疲劳 ${d.fatigue||'—'}/10 · 手腕痛 ${d.wristPain||'—'}/10 · 肩痛 ${d.shoulderPain||'—'}/10 · 有氧 ${d.cardio||'—'} 分钟</p><div class="callout">${esc(d.notes||'无备注')}</div></div><div><h3>训练</h3>${w?`<p>${plans[w.type]?.title||w.type} · ${w.completed?'已完成':'未完成'} · 周期第${w.cycleWeek||currentWeek(date)}周</p><div class="table-wrap"><table class="mini-table"><thead><tr><th>动作</th><th>组</th><th>重量</th><th>次数</th><th>RIR</th></tr></thead><tbody>${(w.exercises||[]).flatMap(er=>(er.sets||[]).map((s,i)=>`<tr><td>${esc(er.name)}</td><td>${esc(s.label||String(i+1))}</td><td>${s.weight||'—'}</td><td>${s.reps||'—'}</td><td>${s.rir||'—'}</td></tr>`)).join('')}</tbody></table></div><p class="small-note">${esc(w.notes||'')}</p>`:'<div class="empty-inline">无训练记录</div>'}</div></div></div>`}
function openHistoryInLog(date){state.ui.logDate=date;state.ui.logType=state.workouts[date]?.type||recommendedPlan(date);saveState();renderLog();switchView('log')}
function deleteHistoryDate(date){if(!confirm(`删除 ${date} 的身体、饮食和训练记录吗？`))return;delete state.daily[date];delete state.workouts[date];state.ui.historyDate=null;saveState('当天记录已删除');renderAll();switchView('history')}
function renderAnalysis(){const s=getStats(),touch=benchStats('touch'),pause=benchStats('pause'),wd=s.weightDays>=5&&s.prevWeightDays>=5?s.weight7-s.weightPrev:NaN,wad=s.waistNow&&s.waistPrev?s.waistNow.v-s.waistPrev.v:NaN,a=analysisAdvice(s,wd,wad,touch),rec=nutritionRecommendation();document.getElementById('view-analysis').innerHTML=`<div class="section-title"><div><h2>趋势分析</h2><p>自动生成体重、腰围、营养、活动、睡眠、训练量和卧推折线图。</p></div><button class="btn secondary" onclick="renderAnalysis();setTimeout(renderCharts,50)">刷新</button></div><div class="card"><h3>本周记录完整度</h3><div class="grid-3"><div class="muted-panel"><strong>晨重</strong>${completenessDots(s.weightDays)}</div><div class="muted-panel"><strong>饮食</strong>${completenessDots(s.mealDays)}</div><div class="muted-panel"><strong>步数</strong>${completenessDots(s.stepsDays)}</div></div><p class="small-note">至少2个数据点才会画线；自动热量建议通常需要两周各≥5天晨重和14天中≥10天饮食记录。</p></div><div class="grid-3" style="margin-top:18px"><div class="analysis-box"><span class="subtle">7日平均体重</span><br><strong>${Number.isFinite(s.weight7)?fmt(s.weight7,2)+' kg':'数据不足'}</strong><p>${Number.isFinite(wd)?`较前7日 ${wd>0?'+':''}${fmt(wd,2)} kg`:'需要两周各≥5天晨重'}</p></div><div class="analysis-box"><span class="subtle">本周最新腰围</span><br><strong>${s.waistNow?fmt(s.waistNow.v,1)+' cm':'数据不足'}</strong><p>${Number.isFinite(wad)?`较上周最新 ${wad>0?'+':''}${fmt(wad,1)} cm`:'每周固定条件测1–2次'}</p></div><div class="analysis-box"><span class="subtle">估算TDEE</span><br><strong>${fmt(rec.tdee,0)} kcal</strong><p>${rec.source}</p></div><div class="analysis-box"><span class="subtle">最近7日主训练</span><br><strong>${s.workouts7}/4 次</strong><p>完成的主训练</p></div><div class="analysis-box"><span class="subtle">已记录日平均蛋白</span><br><strong>${Number.isFinite(s.protein7)?fmt(s.protein7,0)+' g':'数据不足'}</strong><p>达标 ${s.proteinMet}/${s.mealDays||0} 个已记录日</p></div><div class="analysis-box"><span class="subtle">平均步数 / 睡眠</span><br><strong>${Number.isFinite(s.steps7)?fmt(s.steps7,0):'—'} / ${Number.isFinite(s.sleep7)?fmt(s.sleep7,1)+'h':'—'}</strong><p>记录 ${s.stepsDays}/7、${s.sleepDays}/7天</p></div></div><div class="grid-2" style="margin-top:18px"><div class="card"><h3>全幅度卧推</h3>${benchStatBlock(touch)}</div><div class="card"><h3>暂停卧推</h3>${benchStatBlock(pause)}</div></div><div class="chart-grid" style="margin-top:18px">${chartCard('weightChart','体重趋势')}${chartCard('waistChart','腰围趋势')}${chartCard('calorieChart','热量趋势')}${chartCard('proteinChart','蛋白质趋势')}${chartCard('stepsChart','步数趋势')}${chartCard('sleepChart','睡眠趋势')}${chartCard('benchChart','全幅度卧推 e1RM')}${chartCard('volumeChart','单次训练总容量')}</div><div class="card" style="margin-top:18px"><h2>自动判断</h2><div class="callout ${a.cls}"><strong>${a.title}</strong><br>${a.text}</div><p class="small-note">这是规则化趋势提示，不是医学诊断；热量调整仍应结合照片、围度和训练表现。</p></div>`;setTimeout(renderCharts,40)}
function chartCard(id,title){return`<div class="card"><h3>${title}</h3><div class="canvas-wrap"><canvas id="${id}"></canvas></div></div>`}
function benchStatBlock(b){if(!b.latest)return'<div class="empty">尚无该卧推变式记录</div>';const tr=Number.isFinite(b.trend)?`${b.trend>=0?'+':''}${fmt(b.trend*100,1)}%`:'首次';return`<div class="metric-grid" style="grid-template-columns:repeat(2,1fr)"><div class="metric"><div class="label">最近一次e1RM</div><div class="value">${fmt(b.latest.e,1)}<small> kg</small></div><div class="delta">${b.latest.wt}kg×${b.latest.reps} · ${b.latest.date}</div></div><div class="metric"><div class="label">较前次</div><div class="value">${tr}</div><div class="delta">仅比较同一卧推变式</div></div><div class="metric"><div class="label">近28天最佳</div><div class="value">${b.recentBest?fmt(b.recentBest.e,1):'—'}<small> kg</small></div></div><div class="metric"><div class="label">历史最佳</div><div class="value">${b.hist?fmt(b.hist.e,1):'—'}<small> kg</small></div></div></div>`}
function analysisAdvice(s,wd,wad,touch){
 if(s.weightDays<5||s.mealDays<5)return{cls:'warn',title:'先提高记录完整度',text:`本周晨重记录${s.weightDays}/7天、饮食记录${s.mealDays}/7天。暂时不要根据不完整平均值修改热量；先连续记录至少14–21天。`};
 if(s.workouts7<3)return{cls:'warn',title:'当前首要限制是训练执行率',text:`最近7天只完成${s.workouts7}次主训练。先恢复到每周至少3–4次，再判断热量和训练量是否需要改变。`};
 if(Number.isFinite(s.protein7)&&s.protein7<145)return{cls:'warn',title:'蛋白质摄入不足',text:`已记录日平均蛋白质约${fmt(s.protein7,0)}g。先稳定到每天约160g，再评价身体重组效果。`};
 if(Number.isFinite(s.sleep7)&&s.sleepDays>=5&&s.sleep7<7)return{cls:'warn',title:'恢复可能限制力量进步',text:`平均睡眠约${fmt(s.sleep7,1)}小时。暂不增加训练量，优先把实际睡眠提高到7–7.5小时以上。`};
 const benchDown=Number.isFinite(touch.trend)&&touch.trend<-.03;
 if(Number.isFinite(wd)&&wd<-.4&&benchDown)return{cls:'warn',title:'减重偏快且卧推下降',text:'训练日增加100–150 kcal，优先增加25–35g碳水；同时检查睡眠和训练前进食。'};
 if(Number.isFinite(wd)&&wd>.3&&Number.isFinite(wad)&&wad>.5)return{cls:'danger',title:'摄入可能偏高',text:'体重和腰围同时上升。先核对小黄油咖啡、糖水、外食油脂和漏记；若连续2–3周如此，每天减少100–150 kcal。'};
 if(Number.isFinite(wad)&&wad<=-.3&&(!Number.isFinite(touch.trend)||touch.trend>=-.03))return{cls:'',title:'身体重组方向良好',text:'腰围下降，且全幅度卧推没有明显退步。保持当前热量，继续推动动作质量、重量或次数进步。'};
 return{cls:'warn',title:'继续观察，不要频繁调整',text:'目前没有足够证据说明需要改热量。再观察1–2周，并结合腰围、全幅度卧推、照片和主观恢复。'};
}
function dailySeries(key,days=60){return Object.keys(state.daily).sort().map(date=>({date,v:n(state.daily[date]?.[key])})).filter(x=>x.v>0).slice(-days)}
function nutritionSeries(key,days=60){return Object.keys(state.daily).sort().filter(d=>(state.daily[d]?.meals||[]).length).map(date=>({date,v:dailyTotals(date)[key]})).filter(x=>x.v>0).slice(-days)}
function workoutVolumeSeries(days=60){return Object.keys(state.workouts).sort().map(date=>({date,v:(state.workouts[date]?.exercises||[]).reduce((a,e)=>a+(e.sets||[]).reduce((b,s)=>b+n(s.weight)*n(s.reps),0),0)})).filter(x=>x.v>0).slice(-days)}
function renderCharts(){drawSeries('weightChart',dailySeries('weight'),{unit:'kg',pad:.4});drawSeries('waistChart',dailySeries('waist'),{unit:'cm',pad:1});drawSeries('calorieChart',nutritionSeries('cal'),{unit:'kcal',pad:150,zero:false});drawSeries('proteinChart',nutritionSeries('p'),{unit:'g',pad:15});drawSeries('stepsChart',dailySeries('steps'),{unit:'步',pad:1000});drawSeries('sleepChart',dailySeries('sleep'),{unit:'h',pad:.5});drawSeries('benchChart',benchSessions('touch').map(x=>({date:x.date,v:x.e})),{unit:'kg',pad:3});drawSeries('volumeChart',workoutVolumeSeries(),{unit:'kg·次',pad:500})}
function drawSeries(id,rows,opt={}){const c=document.getElementById(id);if(!c)return;const rect=c.getBoundingClientRect(),dpr=window.devicePixelRatio||1;c.width=Math.max(1,rect.width*dpr);c.height=Math.max(1,rect.height*dpr);const ctx=c.getContext('2d');ctx.scale(dpr,dpr);const W=rect.width,H=rect.height;ctx.clearRect(0,0,W,H);rows=(rows||[]).filter(x=>Number.isFinite(x.v));if(rows.length<2){ctx.fillStyle='#9db0ca';ctx.font='14px sans-serif';ctx.textAlign='center';ctx.fillText('至少需要2条记录',W/2,H/2);return}const vals=rows.map(r=>r.v),min=Math.min(...vals),max=Math.max(...vals),spread=Math.max(.001,max-min),pad=Math.max(spread*.2,opt.pad||0),lo=(opt.zero&&min>0)?0:min-pad,hi=max+pad,m={l:52,r:15,t:20,b:32};ctx.strokeStyle='#243752';ctx.lineWidth=1;for(let i=0;i<5;i++){const y=m.t+(H-m.t-m.b)*i/4;ctx.beginPath();ctx.moveTo(m.l,y);ctx.lineTo(W-m.r,y);ctx.stroke();ctx.fillStyle='#9db0ca';ctx.font='10px sans-serif';ctx.textAlign='right';const val=hi-(hi-lo)*i/4;ctx.fillText((Math.abs(val)>=1000?Math.round(val):val.toFixed(Math.abs(val)<20?1:0)),m.l-7,y+4)}const xy=rows.map((r,i)=>({x:m.l+(W-m.l-m.r)*i/(rows.length-1),y:m.t+(H-m.t-m.b)*(hi-r.v)/(hi-lo)})),grad=ctx.createLinearGradient(m.l,0,W-m.r,0);grad.addColorStop(0,'#58d7a3');grad.addColorStop(1,'#79a9ff');ctx.strokeStyle=grad;ctx.lineWidth=3;ctx.beginPath();xy.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));ctx.stroke();ctx.fillStyle='#edf4ff';xy.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,2.7,0,Math.PI*2);ctx.fill()});ctx.fillStyle='#9db0ca';ctx.font='10px sans-serif';ctx.textAlign='center';[0,Math.floor((rows.length-1)/2),rows.length-1].forEach(i=>ctx.fillText(rows[i].date.slice(5),xy[i].x,H-10));ctx.textAlign='left';ctx.fillText(opt.unit||'',m.l+2,12)}
function renderGuide(){document.getElementById('view-guide').innerHTML=`<div class="section-title"><div><h2>执行指南与依据</h2><p>计划原理、记录规则和安全边界。</p></div><span class="tag green">V${APP_VERSION}</span></div><div class="grid-2"><div class="card"><h3>RIR 与 RPE</h3><div class="table-wrap"><table><thead><tr><th>RIR</th><th>约RPE</th><th>含义</th></tr></thead><tbody><tr><td>4</td><td>6</td><td>还能约4次</td></tr><tr><td>3</td><td>7</td><td>还能约3次</td></tr><tr><td>2</td><td>8</td><td>还能约2次</td></tr><tr><td>1</td><td>9</td><td>还能约1次</td></tr><tr><td>0</td><td>10</td><td>力竭</td></tr></tbody></table></div><p class="small-note">复合动作大多保留1–3次；安全孤立动作末组偶尔到RIR0–1。</p></div><div class="card"><h3>V1.4关键逻辑</h3><ul><li>周期周数由阶段开始日自动计算。</li><li>卧推第4、8周会真正生成减量训练记录。</li><li>饮食目标根据实际训练类型判断，也可手动覆盖。</li><li>暂停卧推与全幅度卧推分开分析。</li><li>数据不足时使用公式初始估算；记录充分后用体重变化和实际摄入反推TDEE。</li><li>新增历史记录、八类折线图、自定义目标和动作库。</li></ul></div></div><div class="grid-2" style="margin-top:18px"><div class="card"><h3>体脂秤怎么用</h3><ul><li>S800体脂率、骨盐率和内脏脂肪指数用于趋势，不用于诊断。</li><li>主要指标：7日平均体重、肚脐腰围、固定光线照片、训练表现。</li><li>盐、碳水、外食、甜品、睡眠和排便都会影响单日数字。</li></ul></div><div class="card"><h3>步数与有氧</h3><ul><li>第1–2周7000步；第3–4周7500步；第5周起8000–9000步。</li><li>第1–2周有氧1次×20分钟；第3周起2次×20–25分钟。</li><li>坡度走、自行车或椭圆机，保持能说完整短句的强度。</li></ul></div></div><div class="card" style="margin-top:18px"><h2>久坐、姿态与疼痛</h2><p>每周3–5次：泡沫轴胸椎伸展2×8、靠墙滑手2×10、门框胸肌拉伸2×30秒、下巴微收2×10。每坐60–90分钟起身活动3–5分钟。</p><div class="callout warn">手腕或肩部疼痛达到4/10以上、持续加重、伴麻木或明显影响动作时，不应继续自动加重，应停止相关动作并线下评估。</div></div><div class="card" style="margin-top:18px"><h2>参考来源</h2><div class="source-list"><div class="source"><strong>ACSM Resistance Training Guidelines Update</strong><br><a target="_blank" rel="noopener" href="https://acsm.org/resistance-training-guidelines-update-2026/">打开</a></div><div class="source"><strong>Split vs Full-body systematic review (2024)</strong><br><a target="_blank" rel="noopener" href="https://pubmed.ncbi.nlm.nih.gov/38595233/">打开</a></div><div class="source"><strong>Training frequency meta-analysis</strong><br><a target="_blank" rel="noopener" href="https://pubmed.ncbi.nlm.nih.gov/30558493/">打开</a></div><div class="source"><strong>ISSN Protein Position Stand</strong><br><a target="_blank" rel="noopener" href="https://jissn.biomedcentral.com/articles/10.1186/s12970-017-0177-8">打开</a></div><div class="source"><strong>ISSN Creatine Position Stand</strong><br><a target="_blank" rel="noopener" href="https://jissn.biomedcentral.com/articles/10.1186/s12970-017-0173-z">打开</a></div></div></div><details><summary>免责声明</summary><p>本工具用于一般健身计划和趋势分析，不替代医生、注册营养师或物理治疗师。出现胸痛、晕厥、持续关节痛、麻木或急性伤病时应停止训练并就医。</p></details>`}

function importJSON(file){if(!file)return;const r=new FileReader();r.onload=()=>{try{const x=JSON.parse(r.result);if(!x.daily||!x.workouts)throw Error();state=upgradeStateV14(x);saveState('导入成功');renderAll()}catch(e){alert('文件格式不正确。')}};r.readAsText(file)}
function wipeData(){if(confirm('确定清空所有记录吗？此操作不可撤销。')){localStorage.removeItem(APP_KEY);state=defaultState();renderAll();toast('已清空')}}
function updateProfile(key,val,numeric=false){state.profile[key]=numeric?n(val):val;saveState('基本信息已更新');renderAll()}
function updateGoal(key,val,numeric=false){state.goals[key]=numeric?n(val):val;saveState('目标已更新');renderAll()}
function updateNutrition(key,val,numeric=false){state.nutrition[key]=numeric?n(val):val;saveState('营养设置已更新');renderAll()}
function setManualTarget(day,key,val){state.nutrition.manualTargets[day][key]=n(val);saveState('手动目标已更新');renderAll()}
function setGoalMode(mode){state.goals.mode=mode;state.goals.rate=mode==='cut'?-0.25:mode==='gain'?0.1:mode==='maintain'?0:-0.1;saveState('目标模式已更新');renderAll()}
function enableAutoNutrition(){state.nutrition.mode='auto';saveState('已启用自动营养推荐');renderAll()}
function copyRecommendationToManual(){const r=nutritionRecommendation();state.nutrition.manualTargets=JSON.parse(JSON.stringify(r.targets));state.nutrition.mode='manual';saveState('推荐值已复制到手动模式');renderAll()}

ck="setGoalMode('${k}')">${l}</button>`).join('')}</div><div class="form-grid" style="margin-top:14px"><div class="field" style="grid-column:span 2"><label>目标描述</label><input value="${esc(g.goalText)}" onchange="updateGoal('goalText',this.value)"></div><div class="field"><label>目标体重 kg</label><input type="number" step="0.1" value="${g.targetWeight}" onchange="updateGoal('targetWeight',this.value,true)"></div><div class="field"><label>目标腰围 cm</label><input type="number" step="0.1" value="${g.targetWaist}" onchange="updateGoal('targetWaist',this.value,true)"></div><div class="field"><label>目标体脂率 %</label><input type="number" step="0.1" value="${g.targetBodyFat}" onchange="updateGoal('targetBodyFat',this.value,true)"></div><div class="field"><label>目标体重变化 kg/周</label><input type="number" step="0.05" value="${g.rate}" onchange="updateGoal('rate',this.value,true)"></div><div class="field" style="grid-column:span 2"><label>优先级</label><input value="${esc(g.priority)}" onchange="updateGoal('priority',this.value)"></div></div></div><div class="card" style="margin-top:18px"><div class="section-title"><div><h2>热量与三大营养素</h2><p>自动推荐不是无条件追着日波动变化，而是用7日平均体重；数据足够后使用实际摄入和体重变化反推消耗。</p></div><span class="tag ${nut.mode==='auto'?'green':'orange'}">${nut.mode==='auto'?'自动模式':'手动模式'}</span></div><div class="dynamic-target"><p><strong>${r.source}</strong></p><div class="stat-strip"><div class="stat-chip"><span>计算体重</span><strong>${fmt(r.weight,2)}kg</strong></div><div class="stat-chip"><span>BMR</span><strong>${fmt(r.bmr,0)}</strong></div><div class="stat-chip"><span>TDEE</span><strong>${fmt(r.tdee,0)}</strong></div><div class="stat-chip"><span>训练日</span><strong>${r.targets.training.calories}</strong></div><div class="stat-chip"><span>休息日</span><strong>${r.targets.rest.calories}</strong></div><div class="stat-chip"><span>P/C/F</span><strong>${r.targets.training.protein}/${r.targets.training.carbs}/${r.targets.training.fat}</strong></div></div></div><div class="form-grid" style="margin-top:14px"><div class="field"><label>活动系数（数据不足时）</label><input type="number" step="0.05" value="${nut.activityFactor}" onchange="updateNutrition('activityFactor',this.value,true)"><div class="field-help">久坐但每周4练通常从1.4–1.5校准。</div></div><div class="field"><label>蛋白质 g/kg</label><input type="number" step="0.1" value="${nut.proteinPerKg}" onchange="updateNutrition('proteinPerKg',this.value,true)"></div><div class="field"><label>脂肪 g/kg</label><input type="number" step="0.05" value="${nut.fatPerKg}" onchange="updateNutrition('fatPerKg',this.value,true)"></div><div class="field"><label>每周力量训练天数</label><input type="number" min="1" max="6" value="${nut.trainingDays}" onchange="updateNutrition('trainingDays',this.value,true)"></div><div class="field"><label>步数目标</label><input type="number" step="500" value="${nut.stepTarget}" onchange="updateNutrition('stepTarget',this.value,true)"></div></div><div class="inline-actions"><button class="btn primary" onclick="enableAutoNutrition()">启用自动推荐</button><button class="btn" onclick="copyRecommendationToManual()">复制推荐值并手动调整</button></div>${nut.mode==='manual'?`<div class="grid-2" style="margin-top:16px"><div><h3>训练日手动目标</h3>${manualTargetEditor('training',manual.training)}</div><div><h3>休息日手动目标</h3>${manualTargetEditor('rest',manual.rest)}</div></div>`:''}</div><div class="grid-2" style="margin-top:18px"><div class="card"><h3>周期与日程</h3><div class="form-grid" style="grid-template-columns:repeat(2,1fr)"><div class="field"><label>阶段开始日</label><input type="date" value="${state.settings.phaseStart}" onchange="state.settings.phaseStart=this.value;saveState('开始日已更新');renderAll()"></div><div class="field"><label>自动周数</label><input value="第 ${currentWeek()} 周（卧推第 ${benchWeek()} 周）" disabled></div><div class="field"><label>日程模式</label><select onchange="state.settings.scheduleMode=this.value;saveState('日程模式已更新');renderAll()"><option value="fixed" ${state.settings.scheduleMode==='fixed'?'selected':''}>固定星期</option><option value="cycle" ${state.settings.scheduleMode==='cycle'?'selected':''}>循环顺延</option></select></div><div class="field"><label>暂停卧推基准 kg</label><input type="number" step="0.5" value="${state.settings.pausedBase}" onchange="state.settings.pausedBase=n(this.value);saveState('卧推基准已更新');renderAll()"></div><div class="field"><label>容量卧推基准 kg</label><input type="number" step="0.5" value="${state.settings.volumeBase}" onchange="state.settings.volumeBase=n(this.value);saveState('卧推基准已更新');renderAll()"></div></div></div><div class="card"><h3>备份、换设备和迁移</h3><div class="inline-actions"><button class="btn primary" onclick="exportJSON()">导出完整JSON</button><button class="btn" onclick="exportDailyCSV()">导出每日CSV</button><button class="btn" onclick="exportWorkoutCSV()">导出训练CSV</button></div><div class="field" style="margin-top:14px"><label>导入JSON备份</label><input type="file" accept=".json,application/json" onchange="importJSON(this.files[0])"></div><p class="small-note">JSON包含目标、自定义动作、开发日志、每日记录和训练记录。建议每周备份一次。</p><label class="checkbox-line"><input type="checkbox" ${state.developer.enabled?'checked':''} onchange="state.developer.enabled=this.checked;saveState('开发者模式已更新');renderAll()">显示开发者模式</label></div></div><div class="card" style="margin-top:18px"><h3>危险操作</h3><button class="btn danger" onclick="wipeData()">清空所有记录</button></div>`}

function developerSummaryMarkdown(){const d=state.developer,p=state.profile,g=state.goals,r=nutritionRecommendation();return`# ${d.projectName}\n\n- 版本：V${APP_VERSION}\n- 生成日期：${todayISO()}\n- 当前网址/来源：${location.href}\n- 存储键：${APP_KEY}\n- 存储方式：浏览器 localStorage\n\n## 用户基本信息\n\n- ${p.age}岁，${p.sex==='male'?'男性':'女性'}，${p.height}cm，所在地${p.location}\n- 基线体重${p.startWeight}kg，腰围${p.startWaist}cm，胸围${p.chest}cm，上臂${p.armL}/${p.armR}cm\n- 体脂秤：${p.scaleModel}；体脂${p.bodyFat}%；骨骼肌${p.skeletalMuscle}kg；内脏脂肪等级${p.visceralFat}\n\n## 目标\n\n${g.goalText}\n\n优先级：${g.priority}\n\n## 初步计划\n\n${d.initialPlan}\n\n## 设计计划\n\n${d.designPlan}\n\n## 当前营养推荐\n\n- 来源：${r.source}\n- TDEE：${Math.round(r.tdee)} kcal\n- 训练日：${r.targets.training.calories} kcal，P${r.targets.training.protein}/C${r.targets.training.carbs}/F${r.targets.training.fat}\n- 休息日：${r.targets.rest.calories} kcal，P${r.targets.rest.protein}/C${r.targets.rest.carbs}/F${r.targets.rest.fat}\n\n## 更新记录\n\n${d.changelog.map(x=>`- V${x.version}｜${x.date}｜${x.title}：${x.detail}`).join('\n')}\n\n## 路线图\n\n${d.roadmap.map(x=>`- [${x.status==='已完成'?'x':' '}] ${x.title}（${x.priority}，${x.status}）`).join('\n')}\n`}

tate('训练基线已保存')">${esc(d.baselineTraining)}</textarea><h4>初始饮食数据</h4><textarea onchange="state.developer.baselineDiet=this.value;saveState('饮食基线已保存')">${esc(d.baselineDiet)}</textarea></div><div class="card"><h3>设计计划</h3><textarea style="min-height:180px" onchange="state.developer.designPlan=this.value;saveState('设计计划已保存')">${esc(d.designPlan)}</textarea><h4>开发备注</h4><textarea onchange="state.developer.notes=this.value;saveState('开发备注已保存')" placeholder="技术决策、已知问题、测试结果……">${esc(d.notes||'')}</textarea><div class="inline-actions"><button class="btn primary" onclick="exportDeveloperMarkdown()">导出开发档案 Markdown</button></div></div></div><div class="card" style="margin-top:18px"><div class="section-title"><div><h2>版本更新记录</h2><p>每次升级均写入版本、日期、标题与变化。</p></div></div><div class="table-wrap"><table><thead><tr><th>版本</th><th>日期</th><th>标题</th><th>内容</th><th></th></tr></thead><tbody>${d.changelog.map((x,i)=>`<tr><td>V${esc(x.version)}</td><td>${esc(x.date)}</td><td>${esc(x.title)}</td><td>${esc(x.detail)}</td><td><button class="mini-btn" onclick="deleteChangelog(${i})">删除</button></td></tr>`).join('')}</tbody></table></div><div class="form-grid" style="margin-top:12px"><div class="field"><label>版本</label><input id="clVersion" placeholder="1.3"></div><div class="field"><label>日期</label><input id="clDate" type="date" value="${todayISO()}"></div><div class="field"><label>标题</label><input id="clTitle"></div><div class="field"><label>更新内容</label><input id="clDetail"></div></div><button class="btn" style="margin-top:10px" onclick="addChangelog()">添加更新记录</button></div><div class="card" style="margin-top:18px"><div class="section-title"><div><h2>下一步完善路线图</h2><p>可自定义优先级和状态。</p></div></div>${d.roadmap.map((x,i)=>`<div class="roadmap-item"><input value="${esc(x.title)}" onchange="updateRoadmap(${i},'title',this.value)"><select onchange="updateRoadmap(${i},'priority',this.value)">${['高','中','低'].map(v=>`<option ${x.priority===v?'selected':''}>${v}</option>`).join('')}</select><select onchange="updateRoadmap(${i},'status',this.value)">${['计划中','下一版','进行中','研究中','已完成'].map(v=>`<option ${x.status===v?'selected':''}>${v}</option>`).join('')}</select><button class="remove-btn" onclick="deleteRoadmap(${i})">×</button></div>`).join('')}<div class="inline-actions"><button class="btn" onclick="addRoadmap()">＋ 添加路线图项目</button></div></div>`}

function updateRoadmap(i,key,val){state.developer.roadmap[i][key]=val;saveState()}

function exportDeveloperMarkdown(){download(`开发档案_V${APP_VERSION}_${todayISO()}.md`,developerSummaryMarkdown(),'text/markdown;charset=utf-8');toast('开发档案已导出')}

window.addEventListener('resize',()=>{if(document.getElementById('view-analysis').classList.contains('active'))renderCharts()});
renderAll();
</script>

<script>

function v13uuid(){return(globalThis.crypto&&crypto.randomUUID)?crypto.randomUUID():'id-'+Date.now()+'-'+Math.random().toString(36).slice(2)}
function v13now(){return new Date().toISOString()}
function v13deep(x){return JSON.parse(JSON.stringify(x))}
function v13defaults(){return{
 meta:{schemaVersion:V13_SCHEMA,updatedAt:v13now(),lastMigrationAt:'',migrationHistory:[]},
 cloud:{projectUrl:'',anonKey:'',email:'',userId:'',userEmail:'',lastSyncAt:'',lastStatus:'未配置',autoSync:true,conflictPolicy:'newest',syncLog:[]},
 foodDb:[],mealTemplates:[],photos:[],
 developerTests:{lastRun:'',results:[],migrationResults:[]}
}}
function upgradeStateV13(x){
 const d=v13defaults();x=x&&typeof x==='object'?x:{};
 x.meta=Object.assign({},d.meta,x.meta||{});x.meta.schemaVersion=V13_SCHEMA;
 x.cloud=Object.assign({},d.cloud,x.cloud||{});x.cloud.syncLog=Array.isArray(x.cloud.syncLog)?x.cloud.syncLog:[];
 x.foodDb=Array.isArray(x.foodDb)?x.foodDb:[];x.mealTemplates=Array.isArray(x.mealTemplates)?x.mealTemplates:[];x.photos=Array.isArray(x.photos)?x.photos:[];
 x.developerTests=Object.assign({},d.developerTests,x.developerTests||{});
 x.ui=x.ui||{};if(!x.ui.bodyDate)x.ui.bodyDate=todayISO();if(!x.ui.photoPose)x.ui.photoPose='front';if(!x.ui.foodDate)x.ui.foodDate=todayISO();
 Object.values(x.daily||{}).forEach(v=>{['chest','shoulderCirc','armL','armR','thigh','hip'].forEach(k=>{if(v[k]===undefined)v[k]=''});});
 x.developer=x.developer||{};x.developer.changelog=Array.isArray(x.developer.changelog)?x.developer.changelog:[];
 if(!x.developer.changelog.some(c=>c.version==='1.3'))x.developer.changelog.push({version:'1.3',date:'2026-07-13',title:'云端、体型、食物库与质量保障',detail:'Supabase账号与多设备同步、私有照片存储、体型照片对比、围度趋势、个人食物数据库、整餐复制、自动化自检与版本迁移测试。'});
 x.developer.roadmap=Array.isArray(x.developer.roadmap)?x.developer.roadmap:[];
 const roadmap={
  '云端账号与多设备同步':['高','已实现（待配置）'],
  '体型照片对比与围度趋势':['高','已实现'],
  '个人食物数据库与整餐复制':['高','已实现'],
  '自动化测试与版本迁移测试':['高','已实现基础框架'],
  'PWA安装、离线缓存与自动更新':['高','下一阶段'],
  'Apple健康/运动数据接入':['低','研究中']
 };
 Object.entries(roadmap).forEach(([title,[priority,status]])=>{let r=x.developer.roadmap.find(z=>z.title===title);if(r){r.priority=priority;r.status=status}else x.developer.roadmap.push({title,priority,status})});
 return x;
}

/* ---------- IndexedDB photo storage ---------- */
function v13OpenMediaDB(){return new Promise((resolve,reject)=>{const req=indexedDB.open(V13_MEDIA_DB,1);req.onupgradeneeded=()=>{const db=req.result;if(!db.objectStoreNames.contains(V13_MEDIA_STORE))db.createObjectStore(V13_MEDIA_STORE)};req.onsuccess=()=>resolve(req.result);req.onerror=()=>reject(req.error)})}
async function v13MediaPut(id,blob){const db=await v13OpenMediaDB();return new Promise((resolve,reject)=>{const tx=db.transaction(V13_MEDIA_STORE,'readwrite');tx.objectStore(V13_MEDIA_STORE).put(blob,id);tx.oncomplete=()=>resolve();tx.onerror=()=>reject(tx.error)})}
async function v13MediaGet(id){const db=await v13OpenMediaDB();return new Promise((resolve,reject)=>{const req=db.transaction(V13_MEDIA_STORE).objectStore(V13_MEDIA_STORE).get(id);req.onsuccess=()=>resolve(req.result||null);req.onerror=()=>reject(req.error)})}
async function v13MediaDelete(id){const db=await v13OpenMediaDB();return new Promise((resolve,reject)=>{const tx=db.transaction(V13_MEDIA_STORE,'readwrite');tx.objectStore(V13_MEDIA_STORE).delete(id);tx.oncomplete=()=>resolve();tx.onerror=()=>reject(tx.error)})}
async function v13CompressImage(file){return new Promise((resolve,reject)=>{const url=URL.createObjectURL(file),img=new Image();img.onload=()=>{const max=1600,scale=Math.min(1,max/Math.max(img.width,img.height)),w=Math.round(img.width*scale),h=Math.round(img.height*scale),c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);URL.revokeObjectURL(url);c.toBlob(b=>b?resolve(b):reject(new Error('图片压缩失败')),'image/jpeg',.84)};img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error('无法读取图片'))};img.src=url})}
async function v13PhotoUrl(meta){try{const blob=await v13MediaGet(meta.localKey||meta.id);if(blob){const u=URL.createObjectURL(blob);v13ObjectUrls.push(u);return u}}catch(e){}if(meta.cloudPath&&v13CloudClient&&state.cloud.userId){const{data,error}=await v13CloudClient.storage.from(V13_BUCKET).createSignedUrl(meta.cloudPath,3600);if(!error)return data.signedUrl}return''}
function v13ClearObjectUrls(){v13ObjectUrls.forEach(URL.revokeObjectURL);v13ObjectUrls=[]}

/* ---------- body measurements and photo comparison ---------- */
const v13PoseNames={front:'正面自然',side:'侧面',back:'背面',abs:'正面腹肌',lat:'背阔展开'};
function setBodyDate(v){state.ui.bodyDate=v;saveState();renderBody()}
function setBodyValue(date,key,val){getDaily(date)[key]=val;saveState('围度已保存');renderBody();setTimeout(renderBodyCharts,60)}
function bodyLatest(key){const x=Object.keys(state.daily).sort().map(date=>({date,v:n(state.daily[date]?.[key])})).filter(x=>x.v>0);return x.length?x[x.length-1]:null}
function renderBody(){
 const date=state.ui.bodyDate||todayISO(),d=getDaily(date),poses=Object.keys(v13PoseNames),waist=bodyLatest('waist'),shoulder=bodyLatest('shoulderCirc'),chest=bodyLatest('chest');
 const ratio=(a,b)=>a&&b?fmt(a.v/b.v,2):'—';
 document.getElementById('view-body').innerHTML=`<div class="section-title"><div><h2>体型与围度</h2><p>相同条件测量围度，并用固定光线、距离和姿势拍摄前后照片。</p></div><span class="tag green">照片本地存储于 IndexedDB</span></div>
 <div class="metric-grid"><div class="metric"><div class="label">最新胸围</div><div class="value">${chest?fmt(chest.v,1):'—'}<small> cm</small></div></div><div class="metric"><div class="label">最新肩围</div><div class="value">${shoulder?fmt(shoulder.v,1):'—'}<small> cm</small></div></div><div class="metric"><div class="label">肩腰比</div><div class="value">${ratio(shoulder,waist)}</div></div><div class="metric"><div class="label">胸腰比</div><div class="value">${ratio(chest,waist)}</div></div></div>
 <div class="card" style="margin-top:18px"><div class="section-title"><div><h2>围度记录</h2><p>腰围建议每周1–2次，其余围度每2–4周一次。</p></div><input type="date" style="max-width:180px" value="${date}" onchange="setBodyDate(this.value)"></div><div class="form-grid">${[['weight','体重 kg'],['waist','肚脐腰围 cm'],['chest','胸围 cm'],['shoulderCirc','肩围 cm'],['armL','左屈臂围 cm'],['armR','右屈臂围 cm'],['thigh','大腿围 cm'],['hip','臀围 cm']].map(([k,l])=>`<div class="field"><label>${l}</label><input type="number" step="0.1" value="${esc(d[k]||'')}" onchange="setBodyValue('${date}','${k}',this.value)"></div>`).join('')}</div></div>
 <div class="chart-grid" style="margin-top:18px">${chartCard('chestBodyChart','胸围趋势')}${chartCard('shoulderBodyChart','肩围趋势')}${chartCard('armsBodyChart','平均上臂围趋势')}${chartCard('thighBodyChart','大腿围趋势')}${chartCard('hipBodyChart','臀围趋势')}${chartCard('ratioBodyChart','肩腰比趋势')}</div>
 <div class="card" style="margin-top:18px"><div class="section-title"><div><h2>上传进度照片</h2><p>图片会压缩保存；云端登录后可上传到私有存储。</p></div></div><div class="form-grid"><div class="field"><label>拍摄日期</label><input id="photoDate" type="date" value="${date}"></div><div class="field"><label>姿势</label><select id="photoPose">${poses.map(p=>`<option value="${p}">${v13PoseNames[p]}</option>`).join('')}</select></div><div class="field" style="grid-column:span 2"><label>选择照片</label><input id="photoFile" type="file" accept="image/*"></div></div><div class="inline-actions"><button class="btn primary" onclick="v13AddPhoto()">保存照片</button><button class="btn" onclick="v13SyncPhotos()">同步未上传照片</button></div></div>
 <div class="card" style="margin-top:18px"><div class="section-title"><div><h2>前后对比</h2><p>选择同一姿势的两个日期。</p></div><select style="max-width:180px" onchange="state.ui.photoPose=this.value;saveState();v13RefreshPhotos()">${poses.map(p=>`<option value="${p}" ${state.ui.photoPose===p?'selected':''}>${v13PoseNames[p]}</option>`).join('')}</select></div><div id="photoCompare" class="compare-grid"></div></div>
 <div class="card" style="margin-top:18px"><h2>照片档案</h2><div id="photoGallery" class="photo-grid"><div class="empty">正在载入照片…</div></div></div>`;
 v13RefreshPhotos();
}
function renderBodyCharts(){drawSeries('chestBodyChart',dailySeries('chest'),{unit:'cm',pad:1});drawSeries('shoulderBodyChart',dailySeries('shoulderCirc'),{unit:'cm',pad:1});const arms=Object.keys(state.daily).sort().map(date=>{const a=n(state.daily[date]?.armL),b=n(state.daily[date]?.armR);return{date,v:a&&b?(a+b)/2:(a||b)}}).filter(x=>x.v>0);drawSeries('armsBodyChart',arms,{unit:'cm',pad:.5});drawSeries('thighBodyChart',dailySeries('thigh'),{unit:'cm',pad:1});drawSeries('hipBodyChart',dailySeries('hip'),{unit:'cm',pad:1});const ratio=Object.keys(state.daily).sort().map(date=>{const s=n(state.daily[date]?.shoulderCirc),w=n(state.daily[date]?.waist);return{date,v:s&&w?s/w:0}}).filter(x=>x.v>0);drawSeries('ratioBodyChart',ratio,{unit:'比值',pad:.03})}
async function v13AddPhoto(){const f=document.getElementById('photoFile')?.files?.[0],date=document.getElementById('photoDate')?.value||todayISO(),pose=document.getElementById('photoPose')?.value||'front';if(!f)return toast('请先选择照片');try{const blob=await v13CompressImage(f),id=v13uuid();await v13MediaPut(id,blob);const meta={id,localKey:id,date,pose,createdAt:v13now(),cloudPath:'',size:blob.size};state.photos.push(meta);saveState('照片已保存到本机');if(state.cloud.userId)await v13UploadPhotoCloud(meta,blob);renderBody();setTimeout(renderBodyCharts,60)}catch(e){alert(e.message)}}
async function v13RefreshPhotos(){
 v13ClearObjectUrls();
 const pose=state.ui.photoPose||'front';
 const all=[...state.photos].sort((a,b)=>a.date.localeCompare(b.date));
 const filtered=all.filter(x=>x.pose===pose);
 const gallery=document.getElementById('photoGallery');
 const compare=document.getElementById('photoCompare');
 if(gallery){
  if(!all.length){
   gallery.innerHTML='<div class="empty">还没有照片。建议每4周在相同条件下拍摄。</div>';
  }else{
   const cards=await Promise.all(all.map(async m=>{
    const u=await v13PhotoUrl(m);
    return `<div class="photo-card">${u?`<img src="${u}" alt="${esc(v13PoseNames[m.pose])}">`:'<div class="empty">本机无图片；连接云端后可读取</div>'}<div class="photo-meta"><strong>${m.date} · ${v13PoseNames[m.pose]}</strong><br>${m.cloudPath?'☁ 已同步':'仅本机'}<div class="inline-actions"><button class="btn ghost" onclick="v13DeletePhoto('${m.id}')">删除</button></div></div></div>`;
   }));
   gallery.innerHTML=cards.join('');
  }
 }
 if(compare){
  if(filtered.length<2){
   compare.innerHTML='<div class="empty" style="grid-column:1/-1">同一姿势至少需要两张照片才能对比。</div>';
  }else{
   const first=filtered[0],last=filtered[filtered.length-1];
   const u1=await v13PhotoUrl(first),u2=await v13PhotoUrl(last);
   compare.innerHTML=`<div class="compare-frame">${u1?`<img src="${u1}">`:''}<span class="compare-label">之前 · ${first.date}</span></div><div class="compare-frame">${u2?`<img src="${u2}">`:''}<span class="compare-label">现在 · ${last.date}</span></div>`;
  }
 }
}
async function v13DeletePhoto(id){if(!confirm('删除这张照片及其记录吗？'))return;const m=state.photos.find(x=>x.id===id);try{await v13MediaDelete(m?.localKey||id)}catch(e){}if(m?.cloudPath&&v13CloudClient){try{await v13CloudClient.storage.from(V13_BUCKET).remove([m.cloudPath])}catch(e){}}state.photos=state.photos.filter(x=>x.id!==id);saveState('照片已删除');renderBody()}

/* ---------- personal food DB and whole-meal copy ---------- */
function v13FoodMacros(food,grams){const q=n(grams)/100;return{cal:Math.round(n(food.cal)*q),p:+(n(food.p)*q).toFixed(1),c:+(n(food.c)*q).toFixed(1),f:+(n(food.f)*q).toFixed(1)}}
function v13AddFood(){const g=id=>document.getElementById(id)?.value,name=g('foodName').trim();if(!name)return toast('请输入食物名称');state.foodDb.push({id:v13uuid(),name,cal:n(g('foodCal')),p:n(g('foodP')),c:n(g('foodC')),f:n(g('foodF')),serving:n(g('foodServing'))||100,createdAt:v13now()});saveState('食物已加入个人数据库');renderNutrition()}
function v13DeleteFood(id){if(confirm('删除这个个人食物吗？')){state.foodDb=state.foodDb.filter(x=>x.id!==id);saveState();renderNutrition()}}
function v13AddFoodToDay(id){const food=state.foodDb.find(x=>x.id===id),grams=n(document.getElementById('grams-'+id)?.value)||food.serving||100,date=state.ui.foodDate||todayISO(),m=v13FoodMacros(food,grams);getDaily(date).meals.push({name:`${food.name} ${grams}g`,...m});saveState('已加入饮食记录');renderNutrition();if(state.ui.logDate===date)renderLog()}
function v13SaveMealTemplate(){const date=state.ui.foodDate||todayISO(),meals=v13deep(getDaily(date).meals||[]);if(!meals.length)return toast('该日期没有饮食记录');const name=prompt('整餐模板名称，例如：工作日早餐');if(!name)return;state.mealTemplates.push({id:v13uuid(),name,date,meals,createdAt:v13now()});saveState('整餐模板已保存');renderNutrition()}
function v13ApplyMealTemplate(id){const t=state.mealTemplates.find(x=>x.id===id),date=state.ui.foodDate||todayISO();if(!t)return;getDaily(date).meals.push(...v13deep(t.meals));saveState('整餐已复制到 '+date);renderNutrition();if(state.ui.logDate===date)renderLog()}
function v13DeleteMealTemplate(id){state.mealTemplates=state.mealTemplates.filter(x=>x.id!==id);saveState();renderNutrition()}
function v13CopyMeals(){const from=document.getElementById('mealCopyFrom')?.value,to=document.getElementById('mealCopyTo')?.value;if(!from||!to)return toast('请选择来源和目标日期');const meals=v13deep(getDaily(from).meals||[]);if(!meals.length)return toast('来源日期没有饮食记录');getDaily(to).meals.push(...meals);saveState(`已从${from}复制到${to}`);renderNutrition()}
function v13FoodDatabaseHTML(){const date=state.ui.foodDate||todayISO();return`<div class="card" style="margin-top:18px"><div class="section-title"><div><h2>个人食物数据库</h2><p>录入包装上的每100g营养数据，之后按克数自动计算。</p></div><input type="date" style="max-width:180px" value="${date}" onchange="state.ui.foodDate=this.value;saveState();renderNutrition()"></div><div class="form-grid"><div class="field"><label>食物名称</label><input id="foodName" placeholder="例如：常用燕麦"></div><div class="field"><label>每100g热量</label><input id="foodCal" type="number"></div><div class="field"><label>蛋白质 g</label><input id="foodP" type="number" step="0.1"></div><div class="field"><label>碳水 g</label><input id="foodC" type="number" step="0.1"></div><div class="field"><label>脂肪 g</label><input id="foodF" type="number" step="0.1"></div><div class="field"><label>默认份量 g</label><input id="foodServing" type="number" value="100"></div></div><div class="inline-actions"><button class="btn primary" onclick="v13AddFood()">保存食物</button></div><div class="food-list" style="margin-top:14px">${state.foodDb.length?state.foodDb.map(f=>`<div class="food-row"><strong class="food-name">${esc(f.name)}</strong><span>${f.cal} kcal</span><span>P ${f.p}</span><span>C ${f.c}</span><span>F ${f.f}</span><input id="grams-${f.id}" type="number" value="${f.serving}" title="本次克数"><div class="custom-actions"><button class="btn" onclick="v13AddFoodToDay('${f.id}')">加入</button><button class="remove-btn" onclick="v13DeleteFood('${f.id}')">×</button></div></div>`).join(''):'<div class="empty">还没有个人食物。建议先录入燕麦、奶粉、乳清和常点外卖。</div>'}</div></div>
 <div class="card" style="margin-top:18px"><div class="section-title"><div><h2>整餐模板与日期复制</h2><p>可以保存当天整套早餐/午餐，也可以直接复制某一天全部饮食。</p></div><button class="btn primary" onclick="v13SaveMealTemplate()">把当前日期保存为整餐模板</button></div><div class="preset-grid">${state.mealTemplates.length?state.mealTemplates.map(t=>`<div class="preset"><h4>${esc(t.name)}</h4><p>${t.meals.length}项 · 来源${t.date}</p><div class="inline-actions"><button class="btn" onclick="v13ApplyMealTemplate('${t.id}')">复制到${date}</button><button class="remove-btn" onclick="v13DeleteMealTemplate('${t.id}')">×</button></div></div>`).join(''):'<div class="empty" style="grid-column:1/-1">尚无整餐模板。</div>'}</div><hr><div class="form-grid" style="grid-template-columns:repeat(2,1fr)"><div class="field"><label>来源日期</label><input id="mealCopyFrom" type="date"></div><div class="field"><label>目标日期</label><input id="mealCopyTo" type="date" value="${date}"></div></div><div class="inline-actions"><button class="btn" onclick="v13CopyMeals()">复制整天饮食</button></div></div>`}
renderNutrition=function(){v12RenderNutrition();document.getElementById('view-nutrition').insertAdjacentHTML('beforeend',v13FoodDatabaseHTML())};

/* ---------- Supabase cloud account and sync ---------- */
function v13CloudLog(msg){state.cloud.syncLog=state.cloud.syncLog||[];state.cloud.syncLog.unshift(`${new Date().toLocaleString()}  ${msg}`);state.cloud.syncLog=state.cloud.syncLog.slice(0,40);state.cloud.lastStatus=msg;v13rawSave()}
function v13LoadSupabase(){return new Promise((resolve,reject)=>{if(window.supabase?.createClient)return resolve(window.supabase);const old=document.getElementById('supabase-js-v13');if(old){old.addEventListener('load',()=>resolve(window.supabase));return}const sc=document.createElement('script');sc.id='supabase-js-v13';sc.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';sc.onload=()=>resolve(window.supabase);sc.onerror=()=>reject(new Error('无法加载Supabase客户端，请检查网络'));document.head.appendChild(sc)})}
async function v13InitCloud(){if(!state.cloud.projectUrl||!state.cloud.anonKey)throw new Error('请先填写Project URL和anon key');const lib=await v13LoadSupabase();if(!v13CloudClient)v13CloudClient=lib.createClient(state.cloud.projectUrl,state.cloud.anonKey,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:false}});const{data}=await v13CloudClient.auth.getSession();const user=data.session?.user;if(user){state.cloud.userId=user.id;state.cloud.userEmail=user.email||''}else{state.cloud.userId='';state.cloud.userEmail=''}v13rawSave();return v13CloudClient}

function v13SupabaseSQL(){return`-- 圣体计划 V1.4：在 Supabase SQL Editor 中执行\ncreate table if not exists public.${V13_TABLE} (\n  user_id uuid primary key references auth.users(id) on delete cascade,\n  app_version text not null default '1.4',\n  state jsonb not null default '{}'::jsonb,\n  updated_at timestamptz not null default now()\n);\nalter table public.${V13_TABLE} enable row level security;\ndrop policy if exists \"read own app state\" on public.${V13_TABLE};\ncreate policy \"read own app state\" on public.${V13_TABLE} for select using (auth.uid() = user_id);\ndrop policy if exists \"insert own app state\" on public.${V13_TABLE};\ncreate policy \"insert own app state\" on public.${V13_TABLE} for insert with check (auth.uid() = user_id);\ndrop policy if exists \"update own app state\" on public.${V13_TABLE};\ncreate policy \"update own app state\" on public.${V13_TABLE} for update using (auth.uid() = user_id) with check (auth.uid() = user_id);\ninsert into storage.buckets (id,name,public) values ('${V13_BUCKET}','${V13_BUCKET}',false) on conflict (id) do update set public=false;\ndrop policy if exists \"read own progress photos\" on storage.objects;\ncreate policy \"read own progress photos\" on storage.objects for select using (bucket_id='${V13_BUCKET}' and (storage.foldername(name))[1]=auth.uid()::text);\ndrop policy if exists \"insert own progress photos\" on storage.objects;\ncreate policy \"insert own progress photos\" on storage.objects for insert with check (bucket_id='${V13_BUCKET}' and (storage.foldername(name))[1]=auth.uid()::text);\ndrop policy if exists \"update own progress photos\" on storage.objects;\ncreate policy \"update own progress photos\" on storage.objects for update using (bucket_id='${V13_BUCKET}' and (storage.foldername(name))[1]=auth.uid()::text);\ndrop policy if exists \"delete own progress photos\" on storage.objects;\ncreate policy \"delete own progress photos\" on storage.objects for delete using (bucket_id='${V13_BUCKET}' and (storage.foldername(name))[1]=auth.uid()::text);\n`}

function v14Advice(r){

  if(r.weightDelta<-0.45)out.push('7日均重下降偏快：优先检查训练表现和饥饿感，必要时每日加100–150 kcal。');
  else if(r.weightDelta>0.15)out.push('7日均重没有下降：若腰围也不降，先把日均热量下调100 kcal或增加1500–2000步。');
  else out.push('体重速度在身体重组可接受范围，继续执行并观察腰围和训练表现。');
 }else out.push('还缺少两周晨重数据，暂不做热量结论。');
 if(r.trainingDone<3)out.push('本周力量训练完成少于3次：优先补齐训练频率，不急着改计划。');
 if(r.mealDays&&r.proteinOk/r.mealDays<.75)out.push('蛋白达标率偏低：先固定乳清/瘦肉补足蛋白，再微调碳水脂肪。');

}

ne Position Stand</strong><br><a target="_blank" rel="noopener" href="https://jissn.biomedcentral.com/articles/10.1186/s12970-017-0173-z">打开</a></div></div></div><details><summary>免责声明</summary><p>本工具用于一般健身计划和趋势分析，不替代医疗诊断。出现胸痛、晕厥、持续关节痛、麻木或急性伤病时应停止训练并就医。</p></details>`;

function cascadeSetDown(date,ei,si){
 const er=state.workouts[date]?.exercises?.[ei],base=er?.sets?.[si];
 if(!er||!base){toast('没有找到这一组');return}
 if(!base.weight&&!base.reps&&!base.rir){toast('先填写这一组的重量、次数或RIR');return}
 er.sets.forEach((s,i)=>{

  if(base.reps!==''&&base.reps!==undefined)s.reps=base.reps;
  if(base.rir!==''&&base.rir!==undefined)s.rir=base.rir;
 });
 saveState('已向下填充该动作后续组');
 renderLog();
}

 function nutritionHistoryHTML(){const range=state.ui.historyRange||'30';let dates=historyDates();if(range!=='all'){const min=new Date();min.setDate(min.getDate()-n(range)+1);dates=dates.filter(d=>d>=todayISO(min))}const rows=dates.filter(date=>(state.daily[date]?.meals||[]).length>0);const total=rows.reduce((a,date)=>{const t=dailyTotals(date);a.cal+=t.cal;a.p+=t.p;a.c+=t.c;a.f+=t.f;return a},{cal:0,p:0,c:0,f:0});const avg=rows.length?{cal:total.cal/rows.length,p:total.p/rows.length,c:total.c/rows.length,f:total.f/rows.length}:{cal:0,p:0,c:0,f:0};return '<div class="card nutrition-history-card"><div class="section-title"><div><h2>饮食历史</h2><p>'+(rows.length?'当前范围内 '+rows.length+' 天有饮食记录，日均 '+fmt(avg.cal,0)+' kcal / P'+fmt(avg.p,0)+'g':'当前范围暂无饮食记录。')+'</p></div><button class="btn" onclick="state.ui.historyType=\'nutrition\';saveState();renderHistory()">只看饮食日</button></div>'+(rows.length?'<div class="table-wrap"><table><thead><tr><th>日期</th><th>餐食</th><th>热量</th><th>蛋白</th><th>碳水</th><th>脂肪</th><th>内容</th></tr></thead><tbody>'+rows.map(date=>{const d=state.daily[date],meals=d.meals||[],t=dailyTotals(date);return '<tr class="history-row '+(date===state.ui.historyDate?'selected':'')+'" onclick="selectHistoryDate(\''+date+'\')"><td><strong>'+date+'</strong></td><td>'+meals.length+' 项</td><td>'+fmt(t.cal,0)+'</td><td>'+fmt(t.p,0)+'g</td><td>'+fmt(t.c,0)+'g</td><td>'+fmt(t.f,0)+'g</td><td><div class="meal-chips">'+mealNames(meals)+'</div></td></tr>'}).join('')+'</tbody></table></div>':'<div class="empty-inline">先在记录页添加饮食，历史里就会自动汇总。</div>')+'</div>'}
 const prevHistory=renderHistory;renderHistory=function(){prevHistory();const el=document.getElementById('view-history');if(!el||el.querySelector('.nutrition-history-card'))return;const detail=el.querySelector('.history-detail'),html=nutritionHistoryHTML();if(detail)detail.insertAdjacentHTML('beforebegin',html);else el.insertAdjacentHTML('beforeend',html)};
 window.__v147RuntimeReady=true;renderNav();
})();
</script>
